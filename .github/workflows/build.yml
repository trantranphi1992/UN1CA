name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        target: [b0q]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            7zip attr ccache clang ffmpeg \
            libbrotli-dev openjdk-21-jdk libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp
          sudo modprobe erofs f2fs
          git config --global user.name "trantranphi1992"
          git config --global user.email "trantranphi1992@gmail.com"

      - name: Download stock firmwares
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/download_fw.sh --ignore-source

      - name: Extract stock firmwares
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/extract_fw.sh --ignore-source
          mkdir -p apk-to-upload
          find . -name "*.apk" -type f -exec cp {} apk-to-upload/ \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
         name: android-builds
         path: apk-to-upload/

      - name: Build ROM
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/make_rom.sh
          
      - name: Upload to Pixeldrain with Authentication
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          # Kiểm tra xem có file zip nào không
          if [ -z "$(ls -A out/*.zip 2>/dev/null)" ]; then
            echo "No zip files found in out/ directory."
            exit 1
          fi

          for file in out/*.zip; do
            echo "--------------------------------------"
            echo "Uploading: $(basename "$file")"
            
            # Sử dụng -u để xác thực. Cú pháp của Pixeldrain là "api_key" hoặc ":api_key"
            # Ở đây dùng ":" trước API key để curl hiểu đó là mật khẩu (user trống)
            RESPONSE=$(curl -s -u ":$PD_API_KEY" -T "$file" https://pixeldrain.com/api/file/)
            
            # Trích xuất ID và kiểm tra kết quả
            FILE_ID=$(echo $RESPONSE | jq -r '.id')
            SUCCESS=$(echo $RESPONSE | jq -r '.success')
            
            if [ "$SUCCESS" = "true" ]; then
              echo "✅ Upload thành công!"
              echo "🔗 Link tải: https://pixeldrain.com/u/$FILE_ID"
            else
              echo "❌ Upload thất bại cho $file"
              echo "Chi tiết lỗi: $RESPONSE"
            fi
          done

