Name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'sixteen'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        target: [b0q]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            7zip attr ccache clang ffmpeg jq \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo -n "${{ secrets.PLATFORM_KEY_PK8 }}" | base64 --decode > security/unica_platform.pk8
          echo -n "${{ secrets.PLATFORM_KEY_PEM }}" | base64 --decode > security/unica_platform.x509.pem

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build dependencies
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/build_dependencies.sh

      - name: Download stock firmwares
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/download_fw.sh --ignore-source

      - name: Extract stock firmwares
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/extract_fw.sh --ignore-source

      - name: Build ROM
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/make_rom.sh

      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          # Tìm file zip trong thư mục out/
          ZIP_FILE=$(ls out/*.zip | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::Không tìm thấy file zip nào trong thư mục out/"
            exit 1
          fi
          
          FILENAME=$(basename "$ZIP_FILE")
          echo "Đang upload $FILENAME lên Pixeldrain..."
          
          # Upload bằng API Key (Sử dụng Basic Auth với user trống và password là API Key)
          # Thêm -S -s để chạy ẩn nhưng vẫn báo lỗi nếu có
          RESPONSE=$(curl -S -s -u ":$PD_API_KEY" -T "$ZIP_FILE" https://pixeldrain.com/api/file/)
          
          # Kiểm tra kết quả bằng jq
          SUCCESS=$(echo $RESPONSE | jq -r '.success')
          FILE_ID=$(echo $RESPONSE | jq -r '.id')
          
          if [ "$SUCCESS" = "true" ]; then
            echo "--------------------------------------------------"
            echo "UPLOAD THÀNH CÔNG!"
            echo "File: $FILENAME"
            echo "Link tải: https://pixeldrain.com/u/$FILE_ID"
            echo "--------------------------------------------------"
          else
            echo "::error::Upload thất bại!"
            echo "Phản hồi từ server: $RESPONSE"
            exit 1
          fi
